<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReMarker</title>
  </head>
  <body>
    <div class="popup">
      <header class="popup-header">
        <div class="brand-lockup">
          <img class="brand-mark" src="/icons/remarker-icon.svg" alt="" />
          <strong>ReMarker</strong>
        </div>
        <span class="header-mark" aria-hidden="true"></span>
      </header>

      <section class="site-card" aria-live="polite">
        <span class="site-icon" aria-hidden="true"></span>
        <span id="statusText"></span>
      </section>

      <section class="controls" aria-label="ReMarker controls">
        <label class="control-row">
          <span id="globalEnabledLabel"></span>
          <input id="globalEnabled" type="checkbox" />
        </label>
        <label class="control-row">
          <span id="siteEnabledLabel"></span>
          <input id="siteEnabled" type="checkbox" />
        </label>
        <label class="control-row">
          <span id="autoCloseLookupPanelOnCopyLabel"></span>
          <input id="autoCloseLookupPanelOnCopy" type="checkbox" />
        </label>
      </section>
      <div class="popup-actions">
        <button id="addFootprint" type="button"></button>
        <button id="openOptions" type="button"></button>
      </div>
    </div>
    <script type="module" src="/src/popup/popup.ts"></script>
  </body>
</html>
